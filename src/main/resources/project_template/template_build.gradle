plugins {
    id 'java'
    id 'application'
    id 'io.github.fourlastor.construo' version '2.1.0'
    id 'com.gradleup.shadow' version '9.3.1'
}

group = 'PACKAGE_NAME'
version = '1.0'
ext.projectName = 'PROJECT_NAME'

application {
    mainClass = 'PACKAGE_NAME.Launcher'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.github.tehnewb:Valthorne:1.1.2'
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['assets']
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

tasks.named('shadowJar').configure {
    archiveClassifier.set('')
    mergeServiceFiles()
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    exclude 'javax/sound/**'
}

tasks.named('build').configure {
    dependsOn tasks.named('shadowJar')
}

// ---- Java 25 LWJGL warning suppression / compatibility JVM args ----
def lwjglJvmArgs = [
        // Required for Java 21+ restricted native access warnings
        "--enable-native-access=ALL-UNNAMED",

        // Opens commonly needed by LWJGL / Unsafe / internal buffers
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED",
        "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED",

        // Silences many "illegal access" warning prints on newer JDKs (best-effort)
        "-Djdk.module.illegalAccess.silent=true"
]

// Apply to any JavaExec tasks (e.g., application plugin's run task, custom runners)
tasks.withType(JavaExec).configureEach {
    jvmArgs += lwjglJvmArgs
}

// Apply to all tests
tasks.withType(Test).configureEach {
    jvmArgs += lwjglJvmArgs
}

construo {
    name.set(projectName)
    humanName.set(projectName)
    jarTask.set('shadowJar')
    outputDir.set(rootProject.file('distribution'))

    targets {
        create('winX64', io.github.fourlastor.construo.Target.Windows) {
            architecture.set(io.github.fourlastor.construo.Target.Architecture.X86_64)
            jdkUrl.set('https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25%2B8/OpenJDK25U-jdk_x64_windows_hotspot_25_8.zip')
        }
    }
}